# AegisOps Agent configuration — EXAMPLE (safe to commit).
# Copy once to `aegis-ops.toml` (gitignored) and fill in tokens:
#
#   Copy-Item configs\aegis-ops.example.toml configs\aegis-ops.toml
#
# DEFAULT SHAPE (no Splunk credentials):
#   - LLM:        local Ollama running gpt-oss:20b (or smaller — see below)
#   - Observe:    live gateway REST status only (SPL skipped)
#   - Audit:      dry log to stdout (HEC skipped)
#
# THREE LLM TRANSPORTS are supported, picked by [llm].transport.
# Default "ollama" is what we ran for the hackathon demo; the two
# Splunk `| ai` shapes are implemented but were not exercised on our
# trial — see docs/splunk-blocker.md.
#
#   * "ollama"      — raw Ollama HTTP (default). Edge-first, no Splunk.
#                     See docs/splunk-blocker.md.
#   * "aitk_ollama" — Splunk AI Toolkit `| ai` SPL command, routed
#                     through a user-defined AITK Ollama connection.
#                     Works on Splunk Enterprise (Developer License) —
#                     NO SLIM API required. See docs/aitk-ollama.md.
#   * "splunk_ai"   — Splunk AI Toolkit `| ai` against Splunk-Hosted
#                     Models (gpt-oss-20b / Foundation-Sec). Gated on
#                     the 14-day Cloud trial — see docs/splunk-blocker.md.

[agent]
# Minimum gap between ticks when ticks finish quickly. On CPU Ollama each
# tick can take ~5 min — the loop waits for the tick to finish first.
loop_interval_secs = 15
dry_run = false

[policy]
mode = "low_risk_auto"
min_confidence = 0.6
cooldown_secs = 120

# ------------------------------------------------------------------
# CDTSM forecast feedback loop (OPTIONAL).
# Requires [splunk] url+token AND the Splunk AI Toolkit installed with
# the Cisco Deep Time Series Model (Splunk Hosted) available. When
# enabled, the observer runs the two SPL searches below every tick,
# and if the forecast crosses a threshold, the LLM gets a "predictive
# signal" hint in its prompt. See docs/cdtsm-forecast.md.
# ------------------------------------------------------------------
[observe]
cdtsm_enabled                       = false
cdtsm_horizon_minutes               = 15
cdtsm_history_window                = "-2h"
queue_forecast_breach_threshold     = 4096
savings_forecast_drop_threshold_pct = 75.0

# ------------------------------------------------------------------
# LLM transport: "ollama" | "aitk_ollama" | "splunk_ai"
# ------------------------------------------------------------------
[llm]
transport = "ollama"

[llm.ollama]
# Raw Ollama HTTP. Install: https://ollama.com/download
# Pull the model first:  ollama pull qwen2.5:3b  (or gpt-oss:20b on 16 GB+ RAM)
#
# Model recommendations by available RAM (total system RAM):
#   - 16 GB+ RAM   ->  "gpt-oss:20b"  (matches the Splunk Hosted Models name)
#   - 6-8 GB RAM   ->  "qwen2.5:3b"   (~3 GB active; great JSON quality)
#   - 4-6 GB RAM   ->  "gemma2:2b"    (~2 GB active; good quality)
#   - <4 GB RAM    ->  "qwen2.5:1.5b" (~1.5 GB active; basic but functional)
url             = "http://127.0.0.1:11434"
model           = "qwen2.5:3b"
# CPU-only Ollama: ~5 min per gateway. Two gateways queue on one Ollama
# instance — keep 600+ for local Enterprise demos. GPU hosts can lower this.
timeout_secs    = 600
# Enforces a hard JSON schema on the model's reply via Ollama's
# `format` parameter. Big reliability win for small models. Leave true.
enforce_schema  = true

[llm.aitk_ollama]
# Splunk AI Toolkit `| ai` SPL command, routed through a user-defined
# AITK Ollama connection. Requires [splunk] url+token to be set.
#
# Setup (one-time, on Splunk Enterprise with AITK >= 5.6):
#   1. Splunkbase -> Install "Splunk AI Toolkit".
#   2. Splunk Web -> AITK app -> Connection Management -> New LLM Connection
#       -> Type: Ollama
#       -> Name: ollama_local          (must match `provider` below)
#       -> Endpoint: http://127.0.0.1:11434
#       -> Default model: gpt-oss:20b  (must match `model` below)
#   3. Save.
# See docs/aitk-ollama.md for screenshots and SPL verification.
provider     = "ollama_local"
model        = "gpt-oss:20b"
timeout_secs = 30

[llm.splunk_ai]
# Splunk-Hosted Models via the AI Toolkit `| ai` command (SLIM-backed).
# Currently gated on the 14-day Splunk Cloud trial -- see docs/splunk-blocker.md.
# When provisioned, set `provider = "splunk_hosted"` and `model =
# "gpt-oss-20b" | "gpt-oss-120b" | "Foundation-Sec-1.1-8B-Instruct"`.
provider     = "splunk_hosted"
model        = "gpt-oss-20b"
timeout_secs = 30

# ------------------------------------------------------------------
# Splunk observability (OPTIONAL for C1 smoke test; REQUIRED for Path C).
# Leave url+token empty to skip SPL observations entirely. The agent
# will still observe live gateway state and produce reasoned decisions.
#
# Ports (do not mix them up):
#   8000 — Splunk Web UI in the browser (where you create tokens).
#   8089 — Splunk management REST API (what aegis-ops calls for SPL).
# Opening https://localhost:8089 in Chrome shows NET::ERR_CERT_AUTHORITY_INVALID
# and "Splunk Atom Feed: splunkd" after Proceed — that is normal. The agent
# does not use the browser; keep url on 8089 and verify_tls = false below.
# ------------------------------------------------------------------
[splunk]
url        = "https://localhost:8089"
token      = ""          # Splunk Web (port 8000) -> Settings -> Tokens -> New Token (Audience: aegis-ops)
verify_tls = false       # required for local Splunk Enterprise self-signed cert on 8089
earliest   = "-5m"
latest     = "now"

# ------------------------------------------------------------------
# Splunk MCP Server (OPTIONAL but recommended for hackathon judges).
# When enabled, every observational SPL call from the agent flows
# through MCP `tools/call` to either of:
#   * Splunk Cloud Platform MCP Server v1.1+ (`splunk_run_query`)
#   * Cisco-DevNet Splunk-MCP-Server-official (`run_splunk_query`)
# Auto-detected via `tools/list`; override with `tool_name`.
# Endpoint default for Splunk Cloud / Enterprise hosting the MCP app:
#   https://<splunk-host>:8089/services/mcp
# See: docs/mcp.md
# ------------------------------------------------------------------
[splunk.mcp]
enabled      = false
endpoint     = ""
tool_name    = ""        # leave empty for auto-detect
verify_tls   = true
timeout_secs = 30

# ------------------------------------------------------------------
# Audit (OPTIONAL for C1 smoke test; REQUIRED for Path C).
# Leave hec_endpoint+hec_token empty to skip HEC; the agent will still
# log every decision to stdout for inspection.
# ------------------------------------------------------------------
[audit]
hec_endpoint   = "https://localhost:8088/services/collector/event"
hec_token      = ""      # same token as configs/aegis.toml [hec].token
hec_index      = "aegis"
hec_source     = "aegis:agent"
hec_sourcetype = "aegis:agent"
verify_tls     = false

# ------------------------------------------------------------------
# One [[gateways]] block per Aegis edge to monitor.
# Defaults: two regions on this host (use demo/run-multi-edge.ps1).
# ------------------------------------------------------------------
[[gateways]]
name = "us-east"
url  = "http://127.0.0.1:7321"

[[gateways]]
name = "eu-west"
url  = "http://127.0.0.1:7322"
