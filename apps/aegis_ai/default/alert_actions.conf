[aegis_severity_assessment]
is_custom = 1
track_alert = 1

label = [AI] Aegis Severity Assessment
description = Pipes Aegis suppressed-signature alert data through an LLM Agent (splunklib.ai) to assess severity, summarize the incident, and recommend an Aegis MCP action (status / diagnostic / override).

payload_format = json
alert.execute.cmd = aegis_severity_alert.py
python.version = python3
python.required = 3.13

ttl = 120
maxtime = 2m
