[Aegis Severity Assessment]
description = Triggers when an Aegis gateway sees a suppressed-signature collapse with abnormally high count (>500 in the window). Fires the [AI] Aegis Severity Assessment alert action, which uses splunklib.ai.Agent to produce a JSON severity verdict that lands in sourcetype=aegis_ai:assessment.

search = index="aegis" sourcetype="aegis:metric" count>500 | head 50 | table _time, signature, count, window_secs, sample, service, "classification.label", "classification.confidence", "classification.strategy"

dispatch.earliest_time = -5m
dispatch.latest_time   = now

; Disabled by default. Set enableSched = 1 after configuring AEGIS_AI_LLM_BASE_URL.
enableSched   = 0
cron_schedule = */5 * * * *

counttype = number of events
relation  = greater than
quantity  = 0

alert.track    = 1
alert.suppress = 0
alert.severity = 3

action.aegis_severity_assessment                         = 1
action.aegis_severity_assessment.param.output_index      = aegis
action.aegis_severity_assessment.param.output_sourcetype = assessment

[Aegis Reason Demo]
description = One-shot demonstration of the | aegisreason custom search command. Pulls the last 10 Aegis decision cards and asks the LLM to propose the next operator action for each.

search = index="aegis" sourcetype="aegis:decision" | head 10 | aegisreason context="fleet_operations"

dispatch.earliest_time = -1h
dispatch.latest_time   = now

enableSched = 0

[Aegis Decision Cards]
description = Recent decision cards Aegis emitted. State green / orange / red, root cause service, and a one-line headline.

search = index="aegis" sourcetype="aegis:decision" | sort - _time | head 50 | table _time, state, root_cause_service, headline, similar_count, business_impact

dispatch.earliest_time = -24h
dispatch.latest_time   = now

enableSched = 0

[Aegis Causal Chains]
description = Recent multi-service causal chains Aegis attributed. Each row is one chain with its root cause and the services that fell over.

search = index="aegis" sourcetype="aegis:causal" | sort - _time | head 50 | table _time, root_cause_service, services_involved, confidence, suppressed_lines

dispatch.earliest_time = -24h
dispatch.latest_time   = now

enableSched = 0

[Aegis Incident Memory]
description = Fingerprints in Aegis's incident memory store. Resolved entries carry the cause + fix the engineer recorded; open entries are awaiting resolution.

search = index="aegis" sourcetype="aegis:incident" | sort - ts | head 50 | table _time, incident_id, root_cause_service, services, resolved, cause, fix, resolved_in_minutes

dispatch.earliest_time = -7d
dispatch.latest_time   = now

enableSched = 0

[Aegis Silent Services]
description = Services that were talking and then went quiet. Absence of events is itself a signal.

search = index="aegis" sourcetype="aegis:silent" | sort - _time | head 50 | table _time, service, silence_secs, last_sample

dispatch.earliest_time = -1h
dispatch.latest_time   = now

enableSched = 0
