[Aegis Severity Assessment]
description = Triggers when an Aegis gateway sees a suppressed-signature collapse with abnormally high count (>500 in the window). Fires the [AI] Aegis Severity Assessment alert action, which uses splunklib.ai.Agent to produce a JSON severity verdict that lands in sourcetype=aegis_ai:assessment.

search = index="aegis" sourcetype="aegis:metric" count>500 | head 50 | table _time, signature, count, window_secs, sample, "classification.label", "classification.confidence", "classification.strategy"

dispatch.earliest_time = -5m
dispatch.latest_time   = now

; Disabled by default. Set enableSched = 1 after configuring AEGIS_AI_LLM_BASE_URL.
; Once every 5 minutes is the realistic ceiling: the LLM call is the bottleneck,
; not the SPL, and faster cadence triggers AppInspect's gratuitous-cron warning.
enableSched   = 0
cron_schedule = */5 * * * *

counttype = number of events
relation  = greater than
quantity  = 0

alert.track    = 1
alert.suppress = 0
alert.severity = 3

action.aegis_severity_assessment                       = 1
action.aegis_severity_assessment.param.output_index    = aegis
action.aegis_severity_assessment.param.output_sourcetype = assessment

[Aegis Reason Demo]
description = One-shot demonstration of the | aegisreason custom search command. Pulls the last 10 Aegis agent decisions and asks the LLM to propose the next operator action for each.

search = index="aegis" sourcetype="aegis:agent" | head 10 | aegisreason context="fleet_operations"

dispatch.earliest_time = -1h
dispatch.latest_time   = now

enableSched = 0
