# Demo config used for the in-terminal walkthrough.
#
# No [hec] block → daemon falls back to the stderr sink so every event the
# gateway would have shipped to Splunk prints to your terminal instead.
# Short dedup + causal windows so multi-service incidents fire in seconds
# instead of minutes.

[ingest]
tcp_listen = "127.0.0.1:5140"

[dedup]
window_secs         = 3
max_open_signatures = 4096

[mcp]
http_listen = "127.0.0.1:7321"

[sidecar]
enabled = false

[causal]
window_secs   = 30
min_services  = 3
cooldown_secs = 30

[memory]
path           = "data/aegis-incidents.demo.sqlite"
top_matches    = 3
min_similarity = 0.25

[decision]
idle_to_green_secs = 30

[silence]
silence_secs = 60
sweep_secs   = 5
enabled      = true

[services]
"payment-api"  = "Handles all transaction processing."
"checkout"     = "Customer-facing checkout flow."
"orders"       = "Order fulfilment pipeline."
