# Multi-edge live template: EU-West.
# Copy to configs/aegis-eu-west.toml and fill in HEC token.
# Set [hec].host = "eu-west" so Splunk queries can filter by region.

[hec]
endpoint    = "https://localhost:8088/services/collector/event"
token       = "PUT-YOUR-HEC-TOKEN-HERE"
index       = "aegis"
host        = "eu-west"
timeout_secs = 10
verify_tls  = false

[ingest]
tcp_listen = "127.0.0.1:5142"
udp_listen = "127.0.0.1:5143"

[dedup]
window_secs = 60
max_open_signatures = 4096

[queue]
path = "data/eu-west-queue.sqlite"

[sidecar]
url     = "http://127.0.0.1:8765"
enabled = true

[mcp]
http_listen = "127.0.0.1:7322"

[summary]
enabled = true
