# Aegis edge gateway configuration.
# Copy to `aegis.toml` and fill in the secrets before running.

[hec]
endpoint     = "https://localhost:8088/services/collector/event"
token        = "PUT-YOUR-HEC-TOKEN-HERE"
index        = "aegis"
host         = "aegis-edge-01"
timeout_secs = 10
verify_tls   = false

[ingest]
tcp_listen = "0.0.0.0:5140"
udp_listen = "0.0.0.0:5141"
tail_files = []

# How long Aegis holds an open signature before flushing it as a metric.
# Lower values feel snappier in demos; production typically runs 30-60s.
[dedup]
window_secs         = 30
max_open_signatures = 4096

# Routine-traffic rollup. Requires `[sidecar] enabled = true` so the
# classifier can flag the routine half. Off by default; collapsed events
# already carry the bulk of the FinOps story.
[summary]
enabled    = false
batch_size = 500
flush_secs = 30

[queue]
path                   = "data/aegis-queue.sqlite"
max_disk_bytes         = 1073741824    # 1 GiB
priority_anomaly_first = true

[sidecar]
url     = "http://127.0.0.1:8765"
enabled = true

[self_metrics]
source     = "aegis:self"
sourcetype = "aegis:selfmetric"
flush_secs = 15

[mcp]
http_listen = "127.0.0.1:7321"

# ────────────────────────────────────────────────────────────────────────────
# Causal chain detection — *find what broke first*
#
#   When ≥ `min_services` distinct services first-fire a new signature
#   inside `window_secs`, Aegis emits a CausalChain pointing at whichever
#   service broke earliest. `cooldown_secs` suppresses re-emission so a
#   long incident produces one chain, not one chain per dedup window.
# ────────────────────────────────────────────────────────────────────────────
[causal]
window_secs   = 60
min_services  = 3
cooldown_secs = 300

# ────────────────────────────────────────────────────────────────────────────
# Incident memory — *remembers every incident your team ever had*
#
#   Every chain gets fingerprinted and stored locally. When a similar
#   incident happens again, Aegis surfaces the past cause + fix on the
#   decision card. `min_similarity` is the floor below which past
#   incidents are not surfaced (0.0–1.0).
# ────────────────────────────────────────────────────────────────────────────
[memory]
path           = "data/aegis-incidents.sqlite"
top_matches    = 3
min_similarity = 0.25

# ────────────────────────────────────────────────────────────────────────────
# Decision card — *one clear moment for the engineer*
#
#   The card stays red while a chain is fresh; after `idle_to_green_secs`
#   of quiet, Aegis flips the badge back to green automatically.
# ────────────────────────────────────────────────────────────────────────────
[decision]
idle_to_green_secs = 300

# ────────────────────────────────────────────────────────────────────────────
# Silent-service detector — absence of events is itself a signal
#
#   A service that's been talking and suddenly stops gets flagged after
#   `silence_secs` of quiet. Set `enabled = false` for batch pipelines
#   whose services come and go on schedule.
# ────────────────────────────────────────────────────────────────────────────
[silence]
silence_secs = 120
sweep_secs   = 10
enabled      = true

# Optional: pin known sources to known services. Useful when the log lines
# don't carry a `LEVEL service:` prefix and you want deterministic service
# tagging anyway.
#
# [source_to_service]
# "tcp://10.0.4.12:5140" = "us-east-payment"

# Optional: business-impact text per service. Surfaces verbatim on the
# decision card so on-call engineers see why this service matters without
# hunting for context.
[services]
"payment-api"  = "Handles all transaction processing."
"checkout"     = "Customer-facing checkout flow."
"orders"       = "Order fulfilment pipeline."
"auth"         = "Authentication and session issuance."
"session-cache" = "Hot path cache for active user sessions."
