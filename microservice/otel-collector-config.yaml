# OpenTelemetry Collector — receives OTLP from the workload and forwards
# logs, metrics, and traces to Splunk via HEC.
#
# Run it (contrib collector image ships the splunk_hec exporter):
#
#   docker run --rm -p 4317:4317 -p 4318:4318 \
#     -e SPLUNK_HEC_URL="https://host.docker.internal:8088/services/collector" \
#     -e SPLUNK_HEC_TOKEN="<your-hec-token>" \
#     -e SPLUNK_INDEX="aegis" \
#     -v "${PWD}/otel-collector-config.yaml:/etc/otelcol/config.yaml" \
#     otel/opentelemetry-collector-contrib:latest --config /etc/otelcol/config.yaml
#
# Then start the workload with:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
  resourcedetection:
    detectors: [env, system]
    override: false

exporters:
  # Logs, metrics, and traces all go to Splunk Enterprise / Cloud via HEC.
  splunk_hec:
    token: "${env:SPLUNK_HEC_TOKEN}"
    endpoint: "${env:SPLUNK_HEC_URL}"
    index: "${env:SPLUNK_INDEX}"
    source: "aegis-workload"
    sourcetype: "otel"
    tls:
      insecure_skip_verify: true
  # Handy while wiring things up — prints a summary to the collector logs.
  debug:
    verbosity: normal

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [splunk_hec, debug]
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [splunk_hec, debug]
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [splunk_hec, debug]
